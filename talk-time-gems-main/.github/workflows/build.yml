name: Build Android APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd talk-time-gems-main && npm install

      - name: Build web
        run: cd talk-time-gems-main && npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync Capacitor
        run: cd talk-time-gems-main && npx cap sync android

      - name: Make gradlew executable
        run: chmod +x talk-time-gems-main/android/gradlew

      - name: Build APK
        run: cd talk-time-gems-main/android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: talk-time-gems-main/android/app/build/outputs/apk/debug/app-debug.apk
